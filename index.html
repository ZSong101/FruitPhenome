<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phenotyping</title>
  <link rel="icon" href="data:,">
  <script>
    window.APP_ASSET_VERSION = Date.now().toString();
    document.write(`<link rel="stylesheet" href="styles.css?v=${window.APP_ASSET_VERSION}">`);
  </script>
  <noscript><link rel="stylesheet" href="styles.css"></noscript>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-L1Z92WM3GM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
  
    gtag('config', 'G-L1Z92WM3GM');
  </script>

  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    table { width: max-content; min-width: 100%; border-collapse: collapse; margin: 0 auto; font-size: 14px;}
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; white-space: nowrap; }
    th { background-color: #f4f4f4; }
    img.thumb { max-width: 150px; border-radius: 5px; cursor: pointer; }
    .status { margin-top: 10px; font-weight: bold; color: #333; }
    .charts-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 30px; }
    .chart-box { width: 400px; height: 300px; }
    .inline-option { display: inline-flex; align-items: center; gap: 6px; margin-left: 12px; font-size: 14px; }
    .muted { color: #666; font-size: 13px; }
    .bulk-card { width: min(1680px, calc(100vw - 48px)); max-width: none; margin-left: 50%; transform: translateX(-50%); box-sizing: border-box; }
    .table-wrap { width: 100%; overflow-x: auto; margin-top: 20px; padding-bottom: 6px; }
    #download-csv-btn { display: none; margin-top: 15px; margin-bottom: 10px; padding: 10px 15px; font-weight: bold; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    #download-csv-btn:hover { background: #0056b3; }
    .lightbox-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); justify-content: center; align-items: center; }
    .lightbox-content { max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .lightbox-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; user-select: none; }
    .lightbox-close:hover { color: #ddd; }
    tr.excluded-row td { background-color: #ffe6e6; color: #999; text-decoration: line-through; }
    tr.excluded-row img { filter: grayscale(100%) opacity(0.5); }
    .toggle-checkbox { cursor: pointer; transform: scale(1.2); }
    .bulk-toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .column-dropdown { position: relative; display: inline-block; }
    #column-menu-button { background: #eef1f4; color: #1e2a32; border: 1px solid #b9c3cc; border-radius: 6px; padding-right: 28px; position: relative; }
    #column-menu-button::after { content: "▾"; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #4a5963; }
    #column-menu-button:hover { background: #e1e6eb; }
    .column-menu-panel { display: none; position: absolute; z-index: 50; top: calc(100% + 6px); left: 0; width: min(520px, calc(100vw - 64px)); max-height: 520px; overflow: auto; background: white; border: 1px solid #ccd8df; border-radius: 8px; box-shadow: 0 12px 32px rgba(0,0,0,0.18); padding: 10px; text-align: left; }
    .column-menu-panel.open { display: block; }
    .column-group { border: 1px solid #e0e6eb; border-radius: 6px; padding: 8px; margin-bottom: 8px; }
    .column-depth-1 { margin: 8px 0 8px 14px; background: #fafbfc; }
    .column-group summary { cursor: pointer; font-weight: 700; }
    .column-group summary label { cursor: pointer; }
    .column-children { margin-top: 6px; }
    .column-options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px 10px; margin-top: 8px; padding-left: 12px; }
    .column-option { display: flex; align-items: center; gap: 6px; font-size: 13px; line-height: 1.25; }
    .column-option input, .column-group-checkbox { cursor: pointer; }
  </style>
</head>
<body>
  <!-- THE NEW LOGIN SCREEN -->
  <div id="login-view" class="container" style="max-width: 400px; margin-top: 15vh; text-align: center;">
    <section class="card">
      <h1 style="margin-top: 20px; margin-bottom: 25px;">Access App</h1>
      <form id="login-form">
        <input type="text" id="login-name" placeholder="Enter Name (for analytics)" required style="padding: 10px; font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px;">
        <input type="password" id="login-password" placeholder="Enter Password" required style="padding: 10px; font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px;">
        <button type="submit" style="width: 100%; padding: 10px; font-size: 16px;">Login</button>
      </form>
      <div id="login-error" class="status" style="color: red; margin-top: 10px;"></div>
      <p class="muted" style="margin-top: 10px;">To request access or submit feedback, please email <a href="mailto:zsong@uga.edu">zsong@uga.edu</a> with your institution email.</p>
    </section>
  </div>

  <!-- THE MAIN APP (Hidden by default) -->
  <main id="app-view" class="container" style="display: none;">
    <h1>Phenotyping</h1>

    <!-- SERVER QUEUE DASHBOARD -->
    <div id="server-status" style="background: #e9ecef; padding: 10px; border-radius: 5px; margin-bottom: 20px; text-align: center; font-weight: bold; color: #555; transition: all 0.3s;">
      Connecting to server...
    </div>
    
    <section class="card">
      <h2>Single Image Analysis</h2>
      <form id="single-form">
        <input type="file" id="single-file" accept=".jpg,.jpeg,.png" required>
        <button type="submit">Process Single</button>
      </form>
      <div id="single-status" class="status"></div>
      <div id="single-result" class="result-grid"></div>
    </section>

    <section id="bulk-section" class="card">
      <h2>Bulk Image Analysis</h2>
      <form id="bulk-form">
        <input type="file" id="bulk-files" multiple accept=".jpg,.jpeg,.png" required>
        <button type="submit">Process Batch</button>
      </form>
      <div id="bulk-status" class="status"></div>

      <div id="batch-timer" class="muted" style="display: none; margin-top: 5px; font-family: monospace; font-size: 14px;"></div>
      
      <div class="bulk-toolbar">
        <div class="column-dropdown">
          <button type="button" id="column-menu-button" aria-expanded="false">Columns</button>
          <div id="column-menu-panel" class="column-menu-panel">
            <div id="column-menu"></div>
          </div>
        </div>
        <button id="download-csv-btn">Download CSV</button>
      </div>
      
      <div class="table-wrap">
        <table id="bulk-table" style="display: none;">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
      
      <div id="histograms-container" class="charts-container"></div>
    </section>

    <footer id="last-updated-stamp" class="app-footer">Last updated: loading...</footer>
  </main>

  <div id="lightbox" class="lightbox-overlay">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <img class="lightbox-content" id="lightbox-img">
  </div>
  
  <!-- Auto-busts local app assets so deployments do not need manual cache stamps. -->
  <script>
    const appScript = document.createElement("script");
    appScript.src = `app.js?v=${window.APP_ASSET_VERSION || Date.now()}`;
    document.body.appendChild(appScript);
  </script>
</body>
</html>
